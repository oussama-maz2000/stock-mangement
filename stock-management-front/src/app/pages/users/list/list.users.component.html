<app-page-breadcrumb [pageTitle]="'Users'"></app-page-breadcrumb>
<app-users-filter
  [drawerOpen]="drawerOpen"
  (drawerOpenChange)="closeDrawer()"
  (setFilter)="onFilter($event)"
></app-users-filter>
<div class="space-y-6">
  <div>
    <div
      class="rounded-2xl border border-gray-200 bg-white pt-4 dark:border-white/[0.05] dark:bg-white/[0.03]"
    >
      <div
        class="flex flex-col gap-2 px-5 mb-4 sm:flex-row sm:items-center sm:justify-between sm:px-6"
      >
        <div>
          <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
            Latest Users
          </h3>
        </div>
        <div class="relative">
          <span
            class="absolute -translate-y-1/2 pointer-events-none left-4 top-1/2"
          >
            <svg
              class="fill-gray-500 dark:fill-gray-400"
              width="20"
              height="20"
              viewBox="0 0 20 20"
              fill="none"
            >
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M3.04175 9.37363C3.04175 5.87693 5.87711 3.04199 9.37508 3.04199C12.8731 3.04199 15.7084 5.87693 15.7084 9.37363C15.7084 12.8703 12.8731 15.7053 9.37508 15.7053C5.87711 15.7053 3.04175 12.8703 3.04175 9.37363ZM9.37508 1.54199C5.04902 1.54199 1.54175 5.04817 1.54175 9.37363C1.54175 13.6991 5.04902 17.2053 9.37508 17.2053C11.2674 17.2053 13.003 16.5344 14.357 15.4176L17.177 18.238C17.4699 18.5309 17.9448 18.5309 18.2377 18.238C18.5306 17.9451 18.5306 17.4703 18.2377 17.1774L15.418 14.3573C16.5365 13.0033 17.2084 11.2669 17.2084 9.37363C17.2084 5.04817 13.7011 1.54199 9.37508 1.54199Z"
                fill=""
              />
            </svg>
          </span>
          <input
            #searchInput
            type="text"
            placeholder="Search or type command..."
            class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 pl-12 pr-14 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-gray-900 dark:bg-white/[0.03] dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 xl:w-[430px]"
          />
          <button
            class="absolute right-2.5 top-1/2 inline-flex -translate-y-1/2 items-center gap-0.5 rounded-lg border border-gray-200 bg-gray-50 px-[7px] py-[4.5px] text-xs -tracking-[0.2px] text-gray-500 dark:border-gray-800 dark:bg-white/[0.03] dark:text-gray-400"
          >
            <span> search </span>
          </button>
        </div>

        <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
          <form>
            <div class="relative">
              <div class="flex justify-between items-center gap-3">
                <app-button
                  size="sm"
                  (click)="openModal()"
                  className="bg-brand-600 text-white"
                  >Add User</app-button
                >
                <app-button
                  size="sm"
                  variant="outline"
                  (btnClick)="openDrawer()"
                  >Filter</app-button
                >
              </div>
            </div>
          </form>
        </div>
      </div>

      <div class="overflow-y-auto flex-1">
        <div
          class="max-w-full px-5 overflow-x-auto overflow-y-visible h-full sm:px-6"
        >
          <table class="min-w-full">
            <thead class="border-gray-100 border-y dark:border-white/[0.05]">
              <tr>
                <th
                  class="py-3 font-normal text-gray-500 text-start text-theme-sm dark:text-gray-400"
                >
                  Full Name
                </th>
                <th
                  class="px-4 py-3 font-normal text-gray-500 text-start text-theme-sm dark:text-gray-400"
                >
                  UserName
                </th>
                <th
                  class="px-4 py-3 font-normal text-gray-500 text-start text-theme-sm dark:text-gray-400"
                >
                  Email
                </th>
                <th
                  class="px-4 py-3 font-normal text-gray-500 text-start text-theme-sm dark:text-gray-400"
                >
                  Role
                </th>
                <th
                  class="px-4 py-3 font-normal text-gray-500 text-start text-theme-sm dark:text-gray-400"
                >
                  Status
                </th>
                <th
                  class="px-4 py-3 font-normal text-gray-500 text-start text-theme-sm dark:text-gray-400"
                >
                  <span class="sr-only">Action</span>
                </th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 dark:divide-white/[0.05]">
              @for (item of users(); track $index) {
              <tr>
                <td class="py-4">
                  <div class="flex items-center gap-3">
                    <div
                      class="w-8 h-8 rounded-full bg-brand-600 text-white flex items-center justify-center text-xs font-semibold uppercase"
                    >
                      {{ getInitials(item.fullName) }}
                    </div>
                    <div>
                      <span
                        class="block font-medium text-gray-700 text-theme-sm dark:text-gray-400"
                        >{{ item.fullName }}</span
                      >
                    </div>
                  </div>
                </td>
                <td
                  class="px-4 py-4 text-gray-700 whitespace-nowrap text-theme-sm dark:text-gray-400"
                >
                  {{ item.username }}
                </td>
                <td
                  class="px-4 py-4 text-gray-700 text-theme-sm dark:text-gray-400"
                >
                  {{ item.email }}
                </td>
                <td
                  class="px-4 py-4 text-gray-700 text-theme-sm dark:text-gray-400"
                >
                  <app-badge size="sm" [color]="getBadgeRoleColor(item.role)">
                    {{ StringUtils.getRoleName(item.role) }}
                  </app-badge>
                </td>
                <td
                  class="px-4 py-4 text-gray-700 text-theme-sm dark:text-gray-400"
                >
                  <app-badge size="sm" [color]="getBadgeColor(item.enabled)">
                    {{ item.enabled ? "Enable" : "Disable" }}
                  </app-badge>
                </td>
                <td
                  class="px-4 py-4 text-gray-700 text-theme-sm dark:text-gray-400"
                >
                  <div class="relative inline-block">
                    <app-table-dropdown>
                      <div dropdown-button>
                        <button class="text-gray-500 dark:text-gray-400">
                          <svg
                            class="fill-current"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                          >
                            <path
                              fill-rule="evenodd"
                              clip-rule="evenodd"
                              d="M5.99902 10.245C6.96552 10.245 7.74902 11.0285 7.74902 11.995V12.005C7.74902 12.9715 6.96552 13.755 5.99902 13.755C5.03253 13.755 4.24902 12.9715 4.24902 12.005V11.995C4.24902 11.0285 5.03253 10.245 5.99902 10.245ZM17.999 10.245C18.9655 10.245 19.749 11.0285 19.749 11.995V12.005C19.749 12.9715 18.9655 13.755 17.999 13.755C17.0325 13.755 16.249 12.9715 16.249 12.005V11.995C16.249 11.0285 17.0325 10.245 17.999 10.245ZM13.749 11.995C13.749 11.0285 12.9655 10.245 11.999 10.245C11.0325 10.245 10.249 11.0285 10.249 11.995V12.005C10.249 12.9715 11.0325 13.755 11.999 13.755C12.9655 13.755 13.749 12.9715 13.749 12.005V11.995Z"
                              fill=""
                            />
                          </svg>
                        </button>
                      </div>
                      <div dropdown-content>
                        <button
                          class="text-xs flex w-full rounded-lg px-3 py-2 text-left font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300"
                        >
                          View More
                        </button>
                        <button
                          class="text-xs flex w-full rounded-lg px-3 py-2 text-left font-medium text-gray-500 hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300"
                        >
                          Delete
                        </button>
                      </div>
                    </app-table-dropdown>
                  </div>
                </td>
              </tr>
              }
            </tbody>
          </table>
        </div>
      </div>

      <app-pagination
        [paginationSignal]="usersSignalStore.pagination"
        (onPageChange)="onPage($event)"
      >
      </app-pagination>
    </div>
  </div>
</div>
<app-modal
  [isOpen]="isModalOpen"
  (close)="closeModal()"
  [showCloseButton]="true"
  [isFullscreen]="false"
  className="max-w-2xl"
>
  <app-upsert-user (modalClose)="closeModal()" />
</app-modal>
